name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Build Web Assets (PWA)
      run: |
        mkdir -p www
        cp index.html www/
        cp -r js www/
        cp -r css www/
        cp -r images www/
        cp sw.js www/
        cp manifest.json www/
        cp firebase-messaging-sw.js www/
        cp capacitor.config.json www/

    - name: Add Android Platform (if missing)
      run: |
        if [ ! -d "android" ]; then
          npx cap add android
        else
          echo "Android platform already exists, skipping add step."
        fi

    - name: Copy Firebase Config
      run: |
        mkdir -p android/app
        if [ -f "android/app/google-services.json" ]; then
          echo "google-services.json already in place"
        else
          cp google-services.json android/app/ || echo "Warning: google-services.json not found in root"
        fi

    - name: Patch AndroidManifest for FCM Background Notifications
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        # Inject default_notification_channel_id meta-data so Android knows
        # which channel to use for FCM notifications when app is backgrounded/killed.
        # Without this, background notifications are silently dropped.
        if ! grep -q "default_notification_channel_id" "$MANIFEST"; then
          sed -i '/<\/application>/i \
            <meta-data android:name="com.google.firebase.messaging.default_notification_channel_id" android:value="michu_urgent_v3" />\
            <meta-data android:name="com.google.firebase.messaging.default_notification_icon" android:value="@mipmap/ic_launcher" />\
            <meta-data android:name="com.google.firebase.messaging.default_notification_color" android:value="#0e442c" />' "$MANIFEST"
          echo "✅ FCM meta-data injected into AndroidManifest.xml"
        else
          echo "FCM meta-data already present"
        fi

    # - name: Generate App Icons
    #   run: |
    #     # Use npx to run capacitor-assets without needing to install it globally
    #     # We use logo.png as the source for all icons and splash screens
    #     npx -y @capacitor/assets generate --android

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: michu-stays-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
