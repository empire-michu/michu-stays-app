name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Build Web Assets (PWA)
      run: |
        mkdir -p www
        cp index.html www/
        cp -r js www/
        cp -r css www/
        cp -r images www/
        cp sw.js www/
        cp manifest.json www/
        cp firebase-messaging-sw.js www/
        cp capacitor.config.json www/

    - name: Add Android Platform (if missing)
      run: |
        if [ ! -d "android" ]; then
          npx cap add android
        else
          echo "Android platform already exists, skipping add step."
        fi

    - name: Copy Firebase Config
      run: |
        mkdir -p android/app
        if [ -f "android/app/google-services.json" ]; then
          echo "google-services.json already in place"
        else
          cp google-services.json android/app/ || echo "Warning: google-services.json not found in root"
        fi

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Install Native FCM Background Service
      run: |
        # Copy custom MichuMessagingService.java into the Android project
        JAVA_DIR="android/app/src/main/java/com/michustays/pro"
        mkdir -p "$JAVA_DIR"
        cp android/app/src/main/java/com/michustays/pro/MichuMessagingService.java "$JAVA_DIR/" 2>/dev/null || true
        
        # If cap sync removed it, copy from root android dir
        if [ ! -f "$JAVA_DIR/MichuMessagingService.java" ]; then
          echo "MichuMessagingService.java not found after sync — this shouldn't happen since it's in the android dir"
          ls -la "$JAVA_DIR/"
        else
          echo "✅ MichuMessagingService.java is in place"
        fi

    - name: Patch AndroidManifest for FCM Background Notifications
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        
        # Inject the native FCM service (CRITICAL for background notifications)
        if ! grep -q "MichuMessagingService" "$MANIFEST"; then
          sed -i '/<\/application>/i \
            <service android:name=".MichuMessagingService" android:exported="false"><intent-filter><action android:name="com.google.firebase.MESSAGING_EVENT" \/><\/intent-filter><\/service>' "$MANIFEST"
          echo "✅ MichuMessagingService injected"
        fi
        
        # Inject notification icon meta-data
        if ! grep -q "default_notification_icon" "$MANIFEST"; then
          sed -i '/<\/application>/i \
            <meta-data android:name="com.google.firebase.messaging.default_notification_icon" android:value="@mipmap/ic_launcher" \/>' "$MANIFEST"
          echo "✅ FCM icon meta-data injected"
        fi
        
        # Inject notification channel default
        if ! grep -q "default_notification_channel_id" "$MANIFEST"; then
          sed -i '/<\/application>/i \
            <meta-data android:name="com.google.firebase.messaging.default_notification_channel_id" android:value="michu_urgent_v3" \/>' "$MANIFEST"
          echo "✅ Default channel injected"
        fi
        
        # Inject required permissions
        for PERM in RECEIVE_BOOT_COMPLETED VIBRATE USE_FULL_SCREEN_INTENT; do
          if ! grep -q "$PERM" "$MANIFEST"; then
            sed -i "/<\/manifest>/i \\
              <uses-permission android:name=\"android.permission.$PERM\" />" "$MANIFEST"
            echo "✅ $PERM permission injected"
          fi
        done
        
        echo "--- Final AndroidManifest.xml ---"
        cat "$MANIFEST"

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: michu-stays-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
