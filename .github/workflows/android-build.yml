name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Build Web Assets (PWA)
      run: |
        mkdir -p www
        cp index.html www/
        cp -r js www/
        cp -r css www/
        cp -r images www/
        cp sw.js www/
        cp manifest.json www/
        cp firebase-messaging-sw.js www/
        cp capacitor.config.json www/

    - name: Add Android Platform (if missing)
      run: |
        if [ ! -d "android" ]; then
          npx cap add android
        else
          echo "Android platform already exists, skipping add step."
        fi

    - name: Copy Firebase Config
      run: |
        mkdir -p android/app
        if [ -f "android/app/google-services.json" ]; then
          echo "google-services.json already in place"
        else
          cp google-services.json android/app/ || echo "Warning: google-services.json not found in root"
        fi

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Restore Native FCM Service After Sync
      run: |
        JAVA_DIR="android/app/src/main/java/com/michustays/pro"
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        
        # Ensure MichuMessagingService.java exists
        if [ -f "$JAVA_DIR/MichuMessagingService.java" ]; then
          echo "✅ MichuMessagingService.java is in place"
        else
          echo "❌ MichuMessagingService.java is MISSING after sync!"
          exit 1
        fi
        
        # Ensure our service is declared in manifest
        if ! grep -q "MichuMessagingService" "$MANIFEST"; then
          cat << 'EOF' > patch_manifest.py
import os
import sys

manifest_path = sys.argv[1]
with open(manifest_path, 'r') as f:
    content = f.read()

if 'xmlns:tools="http://schemas.android.com/tools"' not in content:
    content = content.replace('<manifest', '<manifest xmlns:tools="http://schemas.android.com/tools"')

service_block = """
        <service
            android:name=".MichuMessagingService"
            android:exported="false"
            tools:node="replace">
            <intent-filter>
                <action android:name="com.google.firebase.MESSAGING_EVENT" />
            </intent-filter>
        </service>
"""

if '</application>' in content:
    content = content.replace('</application>', service_block + '    </application>')

# Add meta-data for channel
if 'default_notification_channel_id' not in content:
    meta = '        <meta-data android:name="com.google.firebase.messaging.default_notification_channel_id" android:value="michu_urgent_v3" />\n'
    content = content.replace('</application>', meta + '    </application>')

# Add meta-data for icon
if 'default_notification_icon' not in content:
    meta = '        <meta-data android:name="com.google.firebase.messaging.default_notification_icon" android:value="@mipmap/ic_launcher" />\n'
    content = content.replace('</application>', meta + '    </application>')

# Add permissions
perms = [
    "android.permission.RECEIVE_BOOT_COMPLETED",
    "android.permission.VIBRATE",
    "android.permission.USE_FULL_SCREEN_INTENT"
]
for perm_name in perms:
    if perm_name not in content:
        perm_tag = f'    <uses-permission android:name="{perm_name}" />\n'
        content = content.replace('</manifest>', perm_tag + '</manifest>')

with open(manifest_path, 'w') as f:
    f.write(content)
EOF
          python3 patch_manifest.py "$MANIFEST"
          echo "✅ MichuMessagingService and meta-data injected into manifest"
        else
          echo "✅ MichuMessagingService already in manifest"
        fi
        
        echo "--- Final AndroidManifest.xml ---"
        cat "$MANIFEST"

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: michu-stays-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
