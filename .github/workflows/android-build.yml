name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Build Web Assets (PWA)
      run: |
        mkdir -p www
        cp index.html www/
        cp -r js www/
        cp -r css www/
        cp -r images www/
        cp sw.js www/
        cp manifest.json www/
        cp firebase-messaging-sw.js www/
        cp capacitor.config.json www/

    - name: Add Android Platform (if missing)
      run: |
        if [ ! -d "android" ]; then
          npx cap add android
        else
          echo "Android platform already exists, skipping add step."
        fi

    - name: Copy Firebase Config
      run: |
        mkdir -p android/app
        if [ -f "android/app/google-services.json" ]; then
          echo "google-services.json already in place"
        else
          cp google-services.json android/app/ || echo "Warning: google-services.json not found in root"
        fi

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Restore Native FCM Service After Sync
      run: |
        JAVA_DIR="android/app/src/main/java/com/michustays/pro"
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        
        # Ensure MichuMessagingService.java exists
        if [ -f "$JAVA_DIR/MichuMessagingService.java" ]; then
          echo "✅ MichuMessagingService.java is in place"
        else
          echo "❌ MichuMessagingService.java is MISSING after sync!"
          exit 1
        fi
        
        # Ensure our service is declared in manifest
        if ! grep -q "MichuMessagingService" "$MANIFEST"; then
          echo "import sys" > patch.py
          echo "path = sys.argv[1]" >> patch.py
          echo "with open(path, 'r') as f: content = f.read()" >> patch.py
          echo "if 'xmlns:tools' not in content: content = content.replace('<manifest', '<manifest xmlns:tools=\"http://schemas.android.com/tools\"')" >> patch.py
          echo "service = '        <service android:name=\".MichuMessagingService\" android:exported=\"false\" tools:node=\"replace\"><intent-filter><action android:name=\"com.google.firebase.MESSAGING_EVENT\" /></intent-filter></service>'" >> patch.py
          echo "content = content.replace(\"</application>\", service + \"\n    </application>\")" >> patch.py
          echo "with open(path, 'w') as f: f.write(content)" >> patch.py
          python3 patch.py "$MANIFEST"
          echo "✅ MichuMessagingService injected into manifest"
        else
          echo "✅ MichuMessagingService already in manifest"
        fi
        
        # Add permissions if missing
        for PERM in RECEIVE_BOOT_COMPLETED VIBRATE USE_FULL_SCREEN_INTENT; do
          if ! grep -q "$PERM" "$MANIFEST"; then
            sed -i "/<\/manifest>/i \    <uses-permission android:name=\"android.permission.$PERM\" />" "$MANIFEST"
            echo "✅ $PERM permission injected"
          fi
        done
        
        echo "--- Final AndroidManifest.xml ---"
        cat "$MANIFEST"

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: michu-stays-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
